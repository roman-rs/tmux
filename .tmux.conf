

# remap modifier to Ctrl-a
unbind C-b
set -g prefix ^A
bind a send-prefix


#switch panes
bind -n M-y select-pane -L
bind -n M-u select-pane -D
bind -n M-i select-pane -U
bind -n M-o select-pane -R

#switch windows
#set-option -g xterm-keys on
bind -n M-h previous-window
bind -n M-l next-window

#swap windows
bind -r h swap-window -t -1
bind -r l swap-window -t +1

#resize current pane
bind -n M-C-h resize-pane -L 5
bind -n M-C-j resize-pane -D 5
bind -n M-C-k resize-pane -U 5
bind -n M-C-l resize-pane -R 5

# splitting
bind | split-window -h
bind _ split-window -v



# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
#set -g @plugin 'sainnhe/tmux-fzf'

# restore session
set -g @plugin 'tmux-plugins/tmux-resurrect'
#set -g @resurrect-capture-pane-contents 'on'

set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-restore 'on' # Automatic restore on tmux start

# restore nvim
set -g @resurrect-strategy-nvim 'session'
set -g @resurrect-processes '~nvim'

#status bar
set -g @plugin '2kabhishek/tmux2k'
set -g @tmux2k-icons-only true
# set the left and right plugin sections
set -g @tmux2k-left-plugins "session git" # cpu ram"
set -g @tmux2k-right-plugins "cpu time" #"battery network time"
# contorl refresh rate, applies to bandwidth, ping
set -g @tmux2k-refresh-rate 3
# to customize plugin colors
set -g @tmux2k-cpu-colors "black yellow"


#to try
set -g @treemux-tree-client 'nvim-tree'  # or 'neo-tree'
set -g @treemux-tree-nvim-init-file '~/.tmux/plugins/treemux/configs/treemux_init.lua'
set -g @plugin 'kiyoon/treemux'

#mayneed one day
#set -g @plugin 'tmux-plugins/tmux-logging'
set -g @plugin 'noscript/tmux-mighty-scroll'


# Other examples:
# set -g @plugin 'github_username/plugin_name'
# set -g @plugin 'github_username/plugin_name#branch'
# set -g @plugin 'git@github.com:user/plugin'
# set -g @plugin 'git@bitbucket.com:user/plugin'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'

