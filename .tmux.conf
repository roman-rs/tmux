

# remap modifier to Ctrl-a
unbind C-b
set -g prefix ^A
bind a send-prefix


#switch panes
bind -n M-y select-pane -L
bind -n M-u select-pane -D
bind -n M-i select-pane -U
bind -n M-o select-pane -R

#switch windows
#set-option -g xterm-keys on
bind -n M-h previous-window
bind -n M-l next-window

#swap windows (and follow the window)
bind -r h swap-window -t -1\; select-window -t -1
bind -r l swap-window -t +1\; select-window -t +1

#resize current pane
bind -n M-C-h resize-pane -L 5
bind -n M-C-j resize-pane -D 5
bind -n M-C-k resize-pane -U 5
bind -n M-C-l resize-pane -R 5

# splitting
bind | split-window -h
bind _ split-window -v

# Make active pane border bright and obvious
set -g pane-active-border-style fg=colour208,bg=default
# Dim the inactive pane borders
set -g pane-border-style fg=colour240,bg=default
set -g pane-border-lines heavy
# Inactive panes: transparent; active pane: slight dark overlay (less transparent)
set -g window-style 'fg=colour245,bg=terminal'
set -g window-active-style 'fg=colour255,bg=terminal'

# --- Keyboard copy to system clipboard (OSC 52, works over SSH) ---
# Enable OSC 52 clipboard passthrough
set -g set-clipboard on
# Allow applications inside tmux (like nvim) to send OSC 52 sequences through
set -g allow-passthrough on
# Use vi keybindings in copy mode
set-window-option -g mode-keys vi

# Enter copy mode: prefix + [
# v to start selection, y to yank (copies to system clipboard via OSC 52)
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel
# Also support rectangle select with Ctrl-v
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle


# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
#set -g @plugin 'sainnhe/tmux-fzf'

# restore session
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @resurrect-capture-pane-contents 'on'
# restore nvim
set -g @resurrect-strategy-nvim 'session'
set -g @resurrect-processes '~nvim'

##status bar
set -g @plugin '2kabhishek/tmux2k'
set -g @tmux2k-icons-only true
# set the left and right plugin sections
set -g @tmux2k-left-plugins "session git" # cpu ram"
set -g @tmux2k-right-plugins "cpu time" #"battery network time"
## contorl refresh rate, applies to bandwidth, ping
set -g @tmux2k-refresh-rate 10
## to customize plugin colors
set -g @tmux2k-cpu-colors "black yellow"
